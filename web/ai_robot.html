<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Circular AI Face</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: transparent;
            flex-direction: column;
        }

        .face {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 30%, #60a5fa, #4CAF50);
            box-shadow:
                0 0 60px rgba(76, 175, 80, 0.6),
                inset 0 0 40px rgba(255, 255, 255, 0.15);
            position: relative;
            transition: all 0.4s ease;
            animation: breathe 5s ease-in-out infinite;
        }

        /* Eyes */
        .eye {
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 75px;
            overflow: hidden;
        }

        .eye.left {
            left: 63px;
        }

        .eye.right {
            right: 63px;
        }

        .pupil {
            width: 7px;
            height: 7px;
            background: black;
            border-radius: 50%;
            position: absolute;
            top: 5px;
            left: 5px;
        }

        /* Blink */
        @keyframes blink {

            0%,
            92%,
            100% {
                height: 18px;
            }

            95% {
                height: 2px;
            }
        }

        .eye {
            animation: blink 5s infinite;
        }

        /* Mouth */
        .mouth {
            width: 50px;
            height: 12px;
            border-radius: 20px;
            background: white;
            position: absolute;
            bottom: 58px;
            left: 50%;
            transform: translateX(-50%);
            transition: all 0.3s ease;
        }

        /* IDLE */
        .idle {
            filter: brightness(1);
        }

        /* SPEAKING */
        .speaking .mouth {
            animation: speak 0.35s infinite;
        }

        @keyframes speak {
            0% {
                height: 5px;
                border-radius: 20px;
            }

            50% {
                height: 21px;
                border-radius: 50%;
            }

            100% {
                height: 5px;
            }
        }

        /* LISTENING */
        .listening {
            box-shadow:
                0 0 100px rgba(76, 175, 80, 0.9),
                inset 0 0 50px rgba(255, 255, 255, 0.2);
        }

        .listening .pupil {
            transform: scale(1.4);
        }

        .listening .eye {
            animation: shake 0.5s infinite;
        }

        /* Breathing */
        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.04);
            }
        }

        /* Shake */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-2px);
            }

            75% {
                transform: translateX(2px);
            }
        }

        /* Controls */
        .controls {
            margin-top: 30px;
        }

        button {
            margin: 5px;
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            background: #111827;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="face" class="face idle">
        <div class="eye left">
            <div class="pupil"></div>
        </div>
        <div class="eye right">
            <div class="pupil"></div>
        </div>
        <div class="mouth"></div>
    </div>

    <script>
        function setState(state) {
            const face = document.getElementById("face");
            face.className = "face " + state;
        }

        // External control (API style)
        function updateFace(param) {
            setState(param);
        }

        // Read initial state from URL query param
        const urlParams = new URLSearchParams(window.location.search);
        const initialState = urlParams.get('state') || 'idle';
        setState(initialState);

        // Example:
        // updateFace("speaking");
    </script>

</body>

</html>
