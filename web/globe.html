<!DOCTYPE html>
<html>

<head>
    <title>Transparent Globe</title>
    <style>
        body {
            margin: 0;
            background: transparent;
            overflow: hidden;
        }

        #globeViz {
            width: 100vw;
            height: 100vh;
            background: transparent;
        }
    </style>
</head>

<body>

    <div id="globeViz"></div>

    <script src="https://unpkg.com/globe.gl"></script>

    <script>
        // Responsive adjustments
        const isMobile = window.innerWidth < 768;
        const isTablet = window.innerWidth >= 768 && window.innerWidth < 1024;

        const globe = Globe()(document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-day.jpg')
            .backgroundColor('rgba(0,0,0,0)');

        // Keep canvas exactly matched to iframe/container to avoid off-center/cropped rendering.
        globe
            .width(window.innerWidth)
            .height(window.innerHeight);

        // 📍 Bengaluru (HQ)
        const myLocation = {
            lat: 12.9716,
            lng: 77.5946,
            label: "HQ - Bengaluru"
        };

        // 🌍 5 Countries
        const countries = [
            { name: "India", lat: 20.5937, lng: 78.9629 },

            // 📍 City inside India
            { name: "Zimbabwe", lat: -19.0154, lng: 29.1549 },

            { name: "USA", lat: 37.0902, lng: -95.7129 },

            { name: "UK", lat: 55.3781, lng: -3.4360 },

            // 🌍 Africa (center point)
            { name: "Africa", lat: 1.6508, lng: 17.6791 },

            // 📍 Austin (Texas, USA)
            { name: "Austin", lat: 30.2672, lng: -97.7431 },

            // 📍 Dubai (UAE)
            { name: "Dubai", lat: 25.2048, lng: 55.2708 }
        ];

        // Responsive sizes (rings / labels / HTML flags)
        const flagWidthPx = isMobile ? 28 : isTablet ? 32 : 36;
        const hqFlagWidthPx = isMobile ? 32 : isTablet ? 36 : 40;
        const ringMaxRadius = isMobile ? 4 : isTablet ? 6 : 8;
        const labelSize = isMobile ? 1.8 : isTablet ? 2.2 : 4.6;
        const altitude = isMobile ? 2.25 : isTablet ? 2 : 2.2;

        function flagCdnUrl(iso2) {
            return 'https://flagcdn.com/w40/' + iso2 + '.png';
        }

        // ISO 3166-1 alpha-2 for flagcdn; Africa uses CF as rough match for the continent marker coords
        const isoByCountryName = {
            India: 'in',
            Zimbabwe: 'zw',
            USA: 'us',
            UK: 'gb',
            Africa: 'cf',
            Austin: 'us',
            Dubai: 'ae'
        };

        const flagMarkers = [
            {
                lat: myLocation.lat,
                lng: myLocation.lng,
                flagUrl: flagCdnUrl('in'),
                width: hqFlagWidthPx
            },
            ...countries.map(function (c) {
                var iso = isoByCountryName[c.name] || 'us';
                return {
                    lat: c.lat,
                    lng: c.lng,
                    flagUrl: flagCdnUrl(iso),
                    width: flagWidthPx
                };
            })
        ];

        // Flag images (HTML/CSS2D) replace default cylinder "stick" points; pointer-events off so drag still rotates globe
        globe
            .htmlElementsData(flagMarkers)
            .htmlAltitude(0.05)
            .htmlElement(function (d) {
                var el = document.createElement('div');
                el.style.pointerEvents = 'none';
                var img = document.createElement('img');
                img.src = d.flagUrl;
                img.alt = '';
                img.style.width = d.width + 'px';
                img.style.height = 'auto';
                img.style.display = 'block';
                img.style.borderRadius = '4px';
                img.style.boxShadow = '0 1px 5px rgba(0,0,0,0.45)';
                img.style.pointerEvents = 'none';
                el.appendChild(img);
                return el;
            });

        // 💫 Stronger pulse rings (glow effect)
        globe.ringsData([
            myLocation,
            ...countries
        ])
            .ringColor(d => d.name ? '#FF3D00' : '#00FFAA')
            .ringMaxRadius(ringMaxRadius)
            .ringPropagationSpeed(3)
            .ringRepeatPeriod(1000);

        // 🏷️ Labels (HQ + countries)
        globe.labelsData([
            myLocation,
            ...countries.map(c => ({
                lat: c.lat,
                lng: c.lng,
                label: c.name
            }))
        ])
            .labelText('label')
            .labelSize(labelSize)
            .labelColor(() => '#FFFFFF')
            .labelAltitude(0.08);

        // 🎮 Controls
        const controls = globe.controls();

        controls.enableRotate = true;
        controls.enableZoom = false;
        controls.enablePan = false;

        // 🔄 Auto rotate
        controls.autoRotate = true;
        controls.autoRotateSpeed = isMobile ? 2 : 3;

        // 🎯 Focus on center for mobile, HQ for larger screens
        const focusLat = isMobile ? 8 : myLocation.lat;
        const focusLng = isMobile ? 20 : myLocation.lng;

        globe.pointOfView(
            { lat: focusLat, lng: focusLng, altitude: altitude },
            2000
        );

        // Handle window resize
        window.addEventListener('resize', () => {
            globe
                .width(window.innerWidth)
                .height(window.innerHeight);

            const newIsMobile = window.innerWidth < 768;
            const newIsTablet = window.innerWidth >= 768 && window.innerWidth < 1024;

            if (newIsMobile !== isMobile || newIsTablet !== isTablet) {
                location.reload(); // Simple way to reapply responsive settings
            }
        });

        // Wheel does not bubble from an iframe to the parent; forward so Flutter can scroll the page.
        // Send a lightweight string payload to avoid structured-clone conversion issues on Flutter web.
        let wheelDyAccum = 0;
        let wheelFlushScheduled = false;
        window.addEventListener('wheel', function (e) {
            if (window.parent === window) return;
            wheelDyAccum += e.deltaY;
            if (!wheelFlushScheduled) {
                wheelFlushScheduled = true;
                requestAnimationFrame(function () {
                    wheelFlushScheduled = false;
                    const dy = wheelDyAccum;
                    wheelDyAccum = 0;
                    if (!dy) return;
                    try {
                        // Format: tds_globe_wheel:<deltaY>
                        window.parent.postMessage('tds_globe_wheel:' + dy, '*');
                    } catch (err) { }
                });
            }
            e.preventDefault();
            e.stopImmediatePropagation();
        }, { capture: true, passive: false });
    </script>

</body>

</html>
