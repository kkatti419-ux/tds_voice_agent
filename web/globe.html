<!DOCTYPE html>
<html>

<head>
    <title>Transparent Globe</title>
    <style>
        body {
            margin: 0;
            background: transparent;
            overflow: hidden;
        }

        #globeViz {
            width: 100vw;
            height: 100vh;
            background: transparent;
        }
    </style>
</head>

<body>

    <div id="globeViz"></div>

    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>

    <script>
        // Responsive adjustments
        const isMobile = window.innerWidth < 768;
        const isTablet = window.innerWidth >= 768 && window.innerWidth < 1024;

        const globe = Globe()(document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-day.jpg')
            .backgroundColor('rgba(0,0,0,0)');

        // 📍 Bengaluru (HQ)
        const myLocation = {
            lat: 12.9716,
            lng: 77.5946,
            label: "HQ - Bengaluru"
        };

        // 🌍 5 Countries
        const countries = [
            { name: "USA", lat: 37.0902, lng: -95.7129 },
            { name: "Brazil", lat: -14.2350, lng: -51.9253 },
            { name: "Germany", lat: 51.1657, lng: 10.4515 },
            { name: "Australia", lat: -25.2744, lng: 133.7751 },
            { name: "Japan", lat: 36.2048, lng: 138.2529 }
        ];

        // Responsive sizes
        const pointSize = isMobile ? 0.5 : isTablet ? 0.7 : 1;
        const countryPointSize = isMobile ? 0.4 : isTablet ? 0.6 : 0.8;
        const ringMaxRadius = isMobile ? 4 : isTablet ? 6 : 8;
        const labelSize = isMobile ? 1.8 : isTablet ? 2.2 : 4.6;
        const altitude = isMobile ? 2.5 : isTablet ? 2.2 : 2;

        // 🔴 Points (HQ + Countries) - brighter colors
        globe.pointsData([
            {
                lat: myLocation.lat,
                lng: myLocation.lng,
                size: pointSize,
                color: '#00FFAA' // neon green (HQ)
            },
            ...countries.map(c => ({
                lat: c.lat,
                lng: c.lng,
                size: countryPointSize,
                color: '#FF3D00' // bright orange-red
            }))
        ])
            .pointAltitude(0.05) // lift points for visibility
            .pointColor('color');

        // 💫 Stronger pulse rings (glow effect)
        globe.ringsData([
            myLocation,
            ...countries
        ])
            .ringColor(d => d.name ? '#FF3D00' : '#00FFAA')
            .ringMaxRadius(ringMaxRadius)
            .ringPropagationSpeed(3)
            .ringRepeatPeriod(1000);

        // 🏷️ Labels (HQ + countries)
        globe.labelsData([
            myLocation,
            ...countries.map(c => ({
                lat: c.lat,
                lng: c.lng,
                label: c.name
            }))
        ])
            .labelText('label')
            .labelSize(labelSize)
            .labelColor(() => '#FFFFFF')
            .labelAltitude(0.08);

        // 🎮 Controls
        const controls = globe.controls();

        controls.enableRotate = true;
        controls.enableZoom = false;
        controls.enablePan = false;

        // 🔄 Auto rotate
        controls.autoRotate = true;
        controls.autoRotateSpeed = isMobile ? 2 : 3;

        // 🎯 Focus on HQ
        globe.pointOfView(
            { lat: myLocation.lat, lng: myLocation.lng, altitude: altitude },
            2000
        );

        // Handle window resize
        window.addEventListener('resize', () => {
            const newIsMobile = window.innerWidth < 768;
            const newIsTablet = window.innerWidth >= 768 && window.innerWidth < 1024;

            if (newIsMobile !== isMobile || newIsTablet !== isTablet) {
                location.reload(); // Simple way to reapply responsive settings
            }
        });
    </script>

</body>

</html>
